<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>N-CUT AI Studio</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            🎬 N-CUT AI
            <span>AI Studio</span>
        </div>


        <nav class="menu">

            <button class="menu-item active">
                🏠 Dashboard
            </button>


            <button class="menu-item">
                🎨 AI Image
            </button>


            <button class="menu-item">
                🎬 AI Video
            </button>


            <button class="menu-item">
                🎙 AI Voice
            </button>


            <button class="menu-item">
                👄 Avatar
            </button>


            <button class="menu-item">
                📜 History
            </button>


            <button class="menu-item">
                ⚙ Settings
            </button>

        </nav>


        <div class="sidebar-footer">

            <p>
                🚀 Create with AI
            </p>

            <small>
                N-CUT AI v2
            </small>

        </div>


    </aside>



    <!-- MAIN AREA -->

    <main class="main-content">


        <header class="top-header">

            <h1>
                Welcome to N-CUT AI Studio 🚀
            </h1>


            <p>
                AI Video Generator for African Creators
            </p>


        </header>



        <!-- PROMPT SECTION -->

        <section class="card prompt-card">


            <label>
                📝 Prompt
            </label>


            <textarea 
                id="prompt"
                placeholder="Soraty eto ny hevitrao..."
            ></textarea>


            <button id="enhancePrompt" class="secondary-btn">
                ✨ Enhance Prompt
            </button>


        </section>


        <!-- SETTINGS GRID -->

        <section class="settings-grid">


            <div class="card">

                <label>
                    🌍 Language
                </label>


                <select id="language">

                    <option value="mg">
                        Malagasy
                    </option>

                    <option value="fr">
                        Français
                    </option>

                    <option value="en">
                        English        <!-- UPLOAD SECTION -->

        <section class="card upload-card">


            <label>
                📂 Upload Images (1-3)
            </label>


            <input 
                type="file"
                id="imageUpload"
                accept="image/*"
                multiple
            >


            <div id="imagePreview" class="image-preview">

                <!-- Images preview eto -->

            </div>


        </section>




        <!-- GENERATION BUTTONS -->

        <section class="generate-area">


            <button 
                id="generateImage"
                class="primary-btn"
            >

                🎨 Generate Image

            </button>



            <button 
                id="generateVideo"
                class="primary-btn"
            >

                🎬 Generate Video

            </button>


        </section>





        <!-- DURATION AND FORMAT -->


        <section class="settings-grid">


            <div class="card">


                <label>
                    ⏱ Duration
                </label>


                <select id="duration">


                    <option value="5">
                        5 seconds
                    </option>


                    <option value="10">
                        10 seconds
                    </option>


                    <option value="15">
                        15 seconds
                    </option>


                </select>


            </div>




            <div class="card">


                <label>
                    📐 Aspect Ratio
                </label>


                <select id="ratio">


                    <option value="16:9">
                        16:9 Landscape
                    </option>


                    <option value="9:16">
                        9:16 TikTok/Reels
                    </option>


                    <option value="1:1">
                        1:1 Square
                    </option>


                </select>


            </div>


        </section>






        <!-- RESULT AREA -->


        <section class="card result-card">


            <h2>
                📺 Preview / Result
            </h2>



            <div 
                id="loading"
                class="loading hidden"
            >

                ⏳ Generating with AI...

            </div>



            <div 
                id="result"
                class="result-box"
            >


                <p>
                    Ny vokatra AI dia hiseho eto
                </p>


            </div>



        </section>
                    </option>

                </select>

            </div>



            <div class="card">


                <label>
                    🎭 Avatar
                </label>


                <select id="avatar">


                    <option>
                        Malagasy Female
                    </option>


                    <option>
                        Malagasy Male
                    </option>


                    <option>
                        Professional AI Avatar
                    </option>


                </select>


            </div>


        </section>        <!-- STATUS PANEL -->

        <section class="card status-card">

            <h3>
                📊 Studio Status
            </h3>


            <div class="status-item">

                <span>
                    AI Engine
                </span>

                <strong id="aiStatus">
                    Ready ✅
                </strong>

            </div>


            <div class="status-item">

                <span>
                    Server
                </span>

                <strong id="serverStatus">
                    Online 🟢
                </strong>

            </div>


        </section>




    </main>


</div>




<!-- JAVASCRIPT -->

<script src="script.js"></script>


</body>

</html>
