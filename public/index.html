<!DOCTYPE html>
<html lang="mg">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>N-CUT AI V2</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="logo">

<h1>🎬 N-CUT AI</h1>

<p>AI Studio for African Creators</p>

</div>


<div class="card">

<label>📝 Prompt</label>

<textarea
id="prompt"
placeholder="Soraty eto ny hevitrao..."
></textarea>


<label>🌍 Language</label>

<select id="language">

<option>Malagasy</option>

<option>English</option>

<option>Français</option>

</select>


<label>🎭 Avatar</label>

<select id="avatar">

<option>Malagasy Female</option>

<option>Malagasy Male</option>

<option>News Presenter</option>

<option>Business Presenter</option>

<option>Foreign Female</option>

<option>Foreign Male</option>

</select>


<label>🎥 Duration</label>

<select id="duration">

<option>5</option>

<option>10</option>

<option>15</option>

</select>


<label>📐 Aspect Ratio</label>

<select id="ratio">

<option>16:9</option>

<option>9:16</option>

<option>1:1</option>

</select>


<label>📂 Upload Images (1-3)</label>

<input
type="file"
id="images"
multiple
accept="image/*">


<button id="enhance">

✨ Enhance Prompt

</button>


<button id="generateImage">

🎨 Generate Image

</button>


<button id="generateVideo">

🎬 Generate Video

</button>


<div id="result">

Tongasoa eto amin'ny N-CUT AI 🚀

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
